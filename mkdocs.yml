site_name: Steelyard
site_description: The open-source SDK for agentic commerce. Define commerce once. Expose it across MCP, ACP, and UCP.
site_url: https://steelyard.dev
site_author: Steelyard contributors
repo_url: https://github.com/interfacelabs/steelyard-sdk
repo_name: interfacelabs/steelyard-sdk
edit_uri: edit/main/docs/
copyright: Copyright &copy; Steelyard contributors. MIT License.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

nav:
  - Home: index.md
  - Getting started:
    - Quickstart: getting-started.md
  - Concepts:
    - The unification thesis: concepts/unification.md
    - defineCommerce: concepts/define-commerce.md
    - Versioning: concepts/versioning.md
    - Error taxonomy: concepts/errors.md
  - Protocols:
    - MCP: protocols/mcp.md
    - ACP: protocols/acp.md
    - UCP: protocols/ucp.md
  - Packages:
    - "Wallet (junior surface)": packages/buyer-wallet.md
    - "Policy (engine)": packages/buyer-policy.md
    - "Vault (engine)": packages/buyer-vault.md
    - "@steelyard/core": packages/core.md
    - "@steelyard/protocol/mcp": packages/mcp.md
    - "@steelyard/protocol/acp": packages/acp.md
    - "@steelyard/protocol/ucp": packages/ucp.md
    - "@steelyard/buyer/client": packages/client.md
    - "@steelyard/agent": packages/agent.md
  - Architecture: architecture.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/interfacelabs/steelyard-sdk
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/org/steelyard
