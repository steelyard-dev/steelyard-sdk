site_name: Steelyard
site_description: The open-source SDK for agentic commerce. Define commerce once. Expose it as commerce.json, HTTP, MCP, ACP, and UCP.
site_url: https://steelyard.dev
site_author: Steelyard contributors
repo_url: https://github.com/steelyard-dev/steelyard-sdk
repo_name: steelyard-dev/steelyard-sdk
edit_uri: edit/main/docs/
copyright: Copyright &copy; Steelyard contributors. MIT License.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

nav:
  - Home: index.md
  - Getting started:
    - Quickstart: getting-started.md
    - Your first purchase: guides/your-first-purchase.md
    - Policy engine: guides/policy-engine.md
    - x402 paid fetch: guides/x402-paid-fetch.md
    - x402 paywall: guides/x402-paywall.md
    - Static manifest: guides/static-manifest.md
    - Migrating from v0.2: guides/migrating-from-v0.2.md
    - Migrating from v0.4: guides/migrating-from-v0.4.md
    - Release history: releases.md
    - Stripe test mode: guides/stripe-test-mode.md
    - Stripe SPT setup: guides/stripe-test-mode-setup.md
    - Configuring UCP auth: guides/configuring-ucp-auth.md
    - Buyer HMS profile: guides/buyer-hms-profile.md
    - Migrating from Steelyard mode: guides/migrating-from-steelyard-mode.md
  - Concepts:
    - The unification thesis: concepts/unification.md
    - defineCommerce: concepts/define-commerce.md
    - Idempotency: concepts/idempotency.md
    - Mandates: concepts/mandates.md
    - Payment mandates: concepts/payment-mandates.md
    - x402 paid HTTP resources: concepts/x402.md
    - Agentic payment: concepts/agentic-payment.md
    - Payment adapters: concepts/payment-adapters.md
    - Payment handlers: concepts/payment-handlers.md
    - Stripe SPT errors: concepts/stripe-spt-errors.md
    - Trust models: concepts/trust-models.md
    - HTTP Message Signatures: concepts/http-signatures.md
    - UCP auth mechanisms: concepts/auth-mechanisms.md
    - Approval and 3DS: concepts/approval-and-3ds.md
    - Reservations: concepts/reservations.md
    - Integrity: concepts/integrity.md
    - Key rotation: concepts/key-rotation.md
    - Versioning: concepts/versioning.md
    - Error taxonomy: concepts/errors.md
  - Protocols:
    - Commerce manifest: protocols/commerce-manifest.md
    - HTTP API: protocols/http.md
    - MCP: protocols/mcp.md
    - ACP: protocols/acp.md
    - ACP checkout: protocols/acp-checkout.md
    - UCP: protocols/ucp.md
    - UCP checkout: protocols/ucp-checkout.md
    - UCP AP2 mandates: protocols/ap2-mandates.md
  - Packages:
    - "Wallet (junior surface)": packages/buyer-wallet.md
    - "Buyer purchase API": packages/buyer-purchase.md
    - "Policy (engine)": packages/buyer-policy.md
    - "Vault (engine)": packages/buyer-vault.md
    - "@steelyard/core": packages/core.md
    - "@steelyard/merchant/checkout": packages/merchant-checkout.md
    - "@steelyard/merchant/policy": packages/merchant-policy.md
    - "@steelyard/protocol/mcp": packages/mcp.md
    - "@steelyard/protocol/acp": packages/acp.md
    - "@steelyard/protocol/ucp": packages/ucp.md
    - "@steelyard/buyer/client": packages/client.md
    - "@steelyard/agent": packages/agent.md
    - "@steelyard/cli": packages/cli.md
    - "@steelyard/x402": packages/x402.md
  - Architecture: architecture.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/steelyard-dev/steelyard-sdk
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/org/steelyard
