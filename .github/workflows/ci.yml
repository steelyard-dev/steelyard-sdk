name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.lane }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lane: keychain
          - os: ubuntu-latest
            lane: keychain
          - os: ubuntu-latest
            lane: password
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - name: Test (Linux keychain)
        if: runner.os == 'Linux' && matrix.lane == 'keychain'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0 libsecret-1-dev gnome-keyring dbus-x11
          eval "$(dbus-launch --sh-syntax)"
          eval "$(echo -n '' | gnome-keyring-daemon --start --components=secrets --unlock)"
          STEELYARD_TEST_KEYSTORE=keychain pnpm test
      - name: Test
        if: runner.os != 'Linux' || matrix.lane != 'keychain'
        run: pnpm test
        env:
          STEELYARD_TEST_KEYSTORE: ${{ matrix.lane }}
      - name: Buyer examples
        run: |
          STEELYARD_EXAMPLE_DRY_RUN=1 pnpm --filter @steelyard/example-coffee-shop buy:wallet
          STEELYARD_EXAMPLE_DRY_RUN=1 pnpm --filter @steelyard/example-coffee-shop buy:primitives
          STEELYARD_ALLOW_MOCK_PSP=1 STEELYARD_ALLOW_MOCK_MANDATE=1 pnpm --filter @steelyard/example-coffee-shop buy:real -- --protocol acp
          STEELYARD_ALLOW_MOCK_PSP=1 STEELYARD_ALLOW_MOCK_MANDATE=1 pnpm --filter @steelyard/example-coffee-shop buy:real -- --protocol ucp
          STEELYARD_ALLOW_MOCK_PSP=1 STEELYARD_ALLOW_MOCK_MANDATE=1 pnpm --filter @steelyard/example-coffee-shop buy:primitives:v03
          STEELYARD_ALLOW_MOCK_PSP=1 STEELYARD_ALLOW_MOCK_MANDATE=1 pnpm --filter @steelyard/example-coffee-shop scan:routes
      - name: Verify (Linux keychain)
        if: runner.os == 'Linux' && matrix.lane == 'keychain'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(echo -n '' | gnome-keyring-daemon --start --components=secrets --unlock)"
          STEELYARD_TEST_KEYSTORE=keychain pnpm verify --lane ubuntu-keychain
      - name: Verify
        if: runner.os != 'Linux' || matrix.lane != 'keychain'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            pnpm verify --lane macos-keychain
          else
            pnpm verify --lane ubuntu-password
          fi
        env:
          STEELYARD_TEST_KEYSTORE: ${{ matrix.lane }}
