name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.lane }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lane: keychain
          - os: ubuntu-latest
            lane: keychain
          - os: ubuntu-latest
            lane: password
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Linux keychain setup
        if: runner.os == 'Linux' && matrix.lane == 'keychain'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0 libsecret-1-dev gnome-keyring dbus-x11
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          eval "$(echo -n '' | gnome-keyring-daemon --start --components=secrets --unlock)"
          echo "GNOME_KEYRING_CONTROL=$GNOME_KEYRING_CONTROL" >> "$GITHUB_ENV"
      - name: Test
        run: pnpm test
        env:
          STEELYARD_TEST_KEYSTORE: ${{ matrix.lane == 'password' && 'password' || '' }}
      - name: Buyer examples
        run: |
          STEELYARD_EXAMPLE_DRY_RUN=1 pnpm --filter @steelyard/example-coffee-shop buy:wallet
          STEELYARD_EXAMPLE_DRY_RUN=1 pnpm --filter @steelyard/example-coffee-shop buy:primitives
